version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deal_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deal_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deal_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deal_fastapi_backend
    environment:
      - RUNNING_IN_DOCKER=true
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=deal_dashboard
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - JWT_SECRET=7f92a95e63b6510f277189f7833075c3efcd6a8d6b9e2491a62d04a625a6f23c
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # Avoid mounting host node_modules or pycache directly
      - /app/__pycache__

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deal_react_frontend
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: deal_security_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
